services:
  openclaw-gateway:
    image: "${OPENCLAW_IMAGE:?set a reviewed image or local build output before deployment}"
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    networks:
      - agents_net
    environment:
      OPENCLAW_CONFIG_PATH: /workspace/config/openclaw.json
      OPENCLAW_STATE_DIR: /workspace/state
      OPENCLAW_GATEWAY_PORT: "18789"
    volumes:
      - "${OPENCLAW_RUNTIME_ROOT:-/opt/automation/agents/openclaw}/config:/workspace/config:ro"
      - "${OPENCLAW_RUNTIME_ROOT:-/opt/automation/agents/openclaw}/state:/workspace/state"
      - "${OPENCLAW_RUNTIME_ROOT:-/opt/automation/agents/openclaw}/logs:/workspace/logs"
      - "/etc/davlos/secrets/openclaw:/run/secrets/openclaw:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "openclaw gateway status --no-probe >/dev/null 2>&1 || openclaw status >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["openclaw", "gateway", "--port", "18789"]

networks:
  agents_net:
    name: agents_net
    driver: bridge
